<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Чешелистность</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Unbounded', 'Segoe UI', system-ui, sans-serif;
            background: #0a0c12;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .game-main {
            width: 100%;
            height: 100%;
            max-width: 1400px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: rgba(8, 10, 18, 0.7);
            border-radius: 32px;
            backdrop-filter: blur(3px);
            padding: 8px 12px 12px 12px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 8px;
        }

        h1 {
            font-size: clamp(1.1rem, 4.5vw, 1.7rem);
            font-weight: 800;
            background: linear-gradient(135deg, #e8c37e, #c9a03d, #e8b45e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: clamp(0.6rem, 2vw, 0.75rem);
            font-weight: 400;
            color: #8a8faa;
            background: rgba(0,0,0,0.6);
            padding: 5px 12px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        .game-layout {
            display: flex;
            flex: 1;
            gap: 14px;
            min-height: 0;
            overflow: hidden;
        }

        #game-container {
            flex: 1;
            position: relative;
            background: radial-gradient(ellipse at 30% 25%, #151e2c, #0a0e16);
            border-radius: 28px;
            border: 2px solid rgba(80, 110, 150, 0.5);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255,255,255,0.08);
            overflow: hidden;
            touch-action: none;
            min-width: 280px;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            display: block;
            cursor: crosshair;
        }

        .aim-line {
            position: absolute;
            pointer-events: none;
            stroke: rgba(255, 200, 80, 0.9);
            stroke-width: 3;
            stroke-dasharray: 6, 8;
            filter: drop-shadow(0 0 4px #ffaa33);
            z-index: 20;
        }

        .side-panel {
            width: 270px;
            min-width: 250px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            overflow-x: hidden;
            scrollbar-width: thin;
            scrollbar-color: #c9a03d #1e1f2e;
        }

        .side-panel::-webkit-scrollbar {
            width: 4px;
        }
        .side-panel::-webkit-scrollbar-track {
            background: #1e1f2e;
            border-radius: 10px;
        }
        .side-panel::-webkit-scrollbar-thumb {
            background: #c9a03d;
            border-radius: 10px;
        }

        .panel-card {
            background: rgba(12, 16, 26, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 12px;
            border: 1px solid rgba(80, 110, 160, 0.4);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.4);
            transition: all 0.2s;
        }

        .panel-card h3 {
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #e8c37e;
            display: flex;
            align-items: center;
            gap: 6px;
            border-left: 3px solid #e8b45e;
            padding-left: 10px;
            letter-spacing: 0.5px;
        }

        .score-board {
            text-align: center;
        }
        .score-value {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffe0a3, #e8b45e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 8px rgba(200,150,50,0.4);
        }

        .next-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0,0,0,0.5);
            border-radius: 60px;
            padding: 5px 12px;
            margin-top: 8px;
        }
        .next-preview {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1rem;
            border: 2px solid #e8b45e;
            box-shadow: 0 0 12px rgba(232,180,94,0.5);
            transition: 0.1s;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #333;
        }

        .collection-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            margin-top: 6px;
        }
        .char-icon {
            aspect-ratio: 1;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: 600;
            border: 2px solid rgba(200,180,120,0.5);
            transition: all 0.1s;
            position: relative;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #2a2a3a;
        }
        .char-icon.unlocked {
            border-color: #e8b45e;
            box-shadow: 0 0 8px #e8b45e;
        }
        .char-icon.unlocked::after {
            content: "✓";
            position: absolute;
            top: -3px;
            right: -3px;
            background: #2ecc71;
            font-size: 8px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .chain-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 8px;
        }
        .chain-node {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 600;
            border: 2px solid #555;
            position: relative;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #2a2a3a;
        }
        .chain-node.unlocked-chain {
            border-color: #e8b45e;
            box-shadow: 0 0 8px #e8b45e;
        }
        .chain-node:not(:last-child)::after {
            content: "→";
            position: absolute;
            right: -22px;
            font-size: 11px;
            color: #e8b45e;
            font-weight: bold;
        }

        button {
            background: linear-gradient(95deg, #1e2a3e, #141c2c);
            border: 1px solid #4a6a8a;
            padding: 8px 12px;
            border-radius: 40px;
            font-weight: 600;
            font-family: 'Unbounded', sans-serif;
            color: #f0e6d0;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.2s;
            width: 100%;
            margin-top: 6px;
        }
        button:active { transform: scale(0.97); background: #2a3a50; }

        .controls-row {
            display: flex;
            gap: 8px;
        }
        .controls-row button {
            flex: 1;
        }

        .game-over-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 300;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal-content {
            background: linear-gradient(145deg, #11161f, #0a0e16);
            padding: 28px 24px;
            border-radius: 48px;
            text-align: center;
            border: 2px solid #e8b45e;
            max-width: 85vw;
            width: 340px;
            font-family: 'Unbounded', sans-serif;
        }
        .sparkle {
            position: fixed;
            pointer-events: none;
            animation: popSpark 0.7s ease-out forwards;
            z-index: 200;
            border-radius: 50%;
        }
        @keyframes popSpark {
            0% { transform: scale(0.2) translate(0,0); opacity: 1; }
            100% { transform: scale(1.2) translate(var(--tx), var(--ty)); opacity: 0; }
        }

        @media (max-width: 720px) {
            .game-layout { flex-direction: column; }
            .side-panel { width: 100%; flex-direction: row; flex-wrap: wrap; gap: 8px; overflow-x: auto; }
            .panel-card { min-width: 200px; flex: 1; }
        }
    </style>
</head>
<body>
<div class="game-main">
    <div class="game-header">
        <h1>Чешелистность</h1>
        <div class="subtitle">⚡ объединяй → эволюция → величие</div>
    </div>

    <div class="game-layout">
        <div id="game-container">
            <canvas id="game-canvas"></canvas>
            <svg class="aim-line" id="aim-line" style="display:none">
                <line x1="0" y1="0" x2="0" y2="0" stroke="url(#gradLine)" stroke-width="3"/>
                <defs><linearGradient id="gradLine"><stop offset="0%" stop-color="#ffcc66"/><stop offset="100%" stop-color="#ff884d"/></linearGradient></defs>
            </svg>
        </div>

        <div class="side-panel">
            <div class="panel-card">
                <h3>🏆 Счёт & Следующий</h3>
                <div class="score-board"><span class="score-value" id="score">0</span></div>
                <div class="next-area">
                    <span>🔮 Следующий</span>
                    <div class="next-preview" id="next-preview">Ч</div>
                </div>
                <div class="controls-row">
                    <button id="drop-btn">⚡ Быстрый бросок</button>
                    <button id="restart-btn">🔄 Рестарт</button>
                </div>
            </div>

            <div class="panel-card">
                <h3>📖 Коллекция существ</h3>
                <div class="collection-grid" id="character-list"></div>
            </div>

            <div class="panel-card">
                <h3>🔗 Цепь эволюции</h3>
                <div class="chain-row" id="merge-chain"></div>
                <div style="font-size:9px; margin-top:8px; opacity:0.5;">два одинаковых → слияние</div>
            </div>
        </div>
    </div>
</div>

<div id="game-over-modal" class="game-over-modal">
    <div class="modal-content">
        <h2 id="game-result">💀 Конец</h2>
        <p style="margin:15px 0">Счёт: <strong id="final-score">0</strong></p>
        <p>🔓 Открыто: <strong id="unlocked-count">1</strong>/17</p>
        <button id="restart-modal-btn">✨ Перерождение ✨</button>
    </div>
</div>

<script>
    // ==================== КОНФИГ ====================
    const CONFIG = {
        wallThickness: 14,
        groundHeight: 32,
        gravity: 0.6,  // Ещё уменьшена гравитация
        mergeDistance: 120,  // Максимальная дистанция слияния
        maxCharacters: 55,
        spawnCooldown: 850,
        aimPower: 0.19
    };

    // ВСЕ ПЕРСОНАЖИ - ДОБАВЛЕНЫ КОКОС И ЗАВР
    const CHARACTERS = [
        { id: 0, name: "Чешелист", short: "Ч", baseSize: 26, color: "#66ff68", points: 10, rarity: "common", svg: "cheselist" },
        { id: 1, name: "Пукозвук", short: "П", baseSize: 30, color: "#b0b0b0", points: 25, rarity: "common", svg: "pukozvuk" },
        { id: 2, name: "Пакет для яичек", short: "Я", baseSize: 34, color: "#ffd966", points: 50, rarity: "uncommon", svg: "paket" },
        { id: 3, name: "Тохтамыш", short: "Т", baseSize: 38, color: "#cd9a5b", points: 100, rarity: "uncommon", svg: "tokhtamysh" },
        { id: 4, name: "Железный Тимур", short: "Ж", baseSize: 42, color: "#b7aaff", points: 200, rarity: "rare", svg: "timur" },
        { id: 5, name: "Цветоножка", short: "Ц", baseSize: 46, color: "#ff6b6b", points: 400, rarity: "rare", svg: "cvetonozhka" },
        { id: 6, name: "Чашеяичко", short: "ЧЯ", baseSize: 50, color: "#e0e0e0", points: 800, rarity: "epic", svg: "chasheyaichko" },
        { id: 7, name: "Смесси", short: "С", baseSize: 54, color: "#3cc7ff", points: 1600, rarity: "epic", svg: "smessi" },
        { id: 8, name: "Большое Гнездо", short: "Г", baseSize: 58, color: "#f3d572", points: 3200, rarity: "legendary", svg: "gnezdo" },
        { id: 9, name: "Августул", short: "А", baseSize: 62, color: "#5fdfce", points: 6400, rarity: "legendary", svg: "avgustul" },
        { id: 10, name: "Пума", short: "ПУ", baseSize: 66, color: "#c2b9b0", points: 12800, rarity: "mythic", svg: "puma" },
        { id: 11, name: "Акварель", short: "АК", baseSize: 70, color: "#f0e6d2", points: 25600, rarity: "mythic", svg: "akvarel" },
        { id: 12, name: "Манул", short: "М", baseSize: 74, color: "#bfa98e", points: 51200, rarity: "divine", svg: "manul" },
        { id: 13, name: "Пончара", short: "ПО", baseSize: 78, color: "#ffb7d2", points: 102400, rarity: "divine", svg: "ponchara" },
        { id: 14, name: "Кокос", short: "КК", baseSize: 82, color: "#8B7355", points: 204800, rarity: "divine", svg: "kokos" },
        { id: 15, name: "Завр", short: "ЗВ", baseSize: 86, color: "#5D8A3C", points: 409600, rarity: "ultimate", svg: "zavr" },
        { id: 16, name: "Ваниль", short: "В", baseSize: 90, color: "#feffb0", points: 819200, rarity: "ultimate", svg: "vanil" }
    ];

    let engine, world, runner;
    let characters = [];
    let score = 0;
    let unlockedCharacters = [0];
    let nextCharacterId = 0;
    let canDrop = true;
    let gameActive = true;
    let pendingMerge = false;
    let mergeQueue = []; // Очередь слияний

    let isAiming = false;
    let aimStart = { x: 0, y: 0 };
    let aimCurrent = { x: 0, y: 0 };
    let pendingChar = null;

    let canvas, ctx, gameContainer, aimLine;
    let canvasWidth = 600, canvasHeight = 700;
    
    const svgCache = new Map();

    function loadSVG(svgName) {
        if (svgCache.has(svgName)) return Promise.resolve(svgCache.get(svgName));
        const img = new Image();
        const path = `./${svgName}.svg`;
        return new Promise((resolve) => {
            img.onload = () => {
                svgCache.set(svgName, img);
                resolve(img);
            };
            img.onerror = () => {
                svgCache.set(svgName, null);
                resolve(null);
            };
            img.src = path;
        });
    }

    function getCharacterImage(id) {
        const char = CHARACTERS[id];
        if (!char) return null;
        return svgCache.get(char.svg) || null;
    }

    function getContrast(hex) {
        let r, g, b;
        if (hex && hex.startsWith('#')) {
            r = parseInt(hex.slice(1,3),16);
            g = parseInt(hex.slice(3,5),16);
            b = parseInt(hex.slice(5,7),16);
        } else { r=128;g=128;b=128; }
        const lum = (0.299*r + 0.587*g + 0.114*b)/255;
        return lum > 0.65 ? '#111' : '#fff';
    }

    function resizeAndFit() {
        const rect = gameContainer.getBoundingClientRect();
        canvasWidth = Math.max(300, rect.width);
        canvasHeight = Math.max(340, rect.height);
        canvas.width = canvasWidth;
        canvas.height = canvasHeight;
        canvas.style.width = `${canvasWidth}px`;
        canvas.style.height = `${canvasHeight}px`;
        
        aimLine.setAttribute('width', canvasWidth);
        aimLine.setAttribute('height', canvasHeight);
        if (world) recreateBoundaries();
    }

    function recreateBoundaries() {
        if(!world) return;
        const staticBodies = Matter.Composite.allBodies(world).filter(b => b.isStatic);
        Matter.World.remove(world, staticBodies);
        const wallOpts = { isStatic: true, restitution: 0.3, friction: 0.2, render: { fillStyle: 'transparent', strokeStyle: '#4a6e8e', lineWidth: 1.5 } };
        Matter.World.add(world, Matter.Bodies.rectangle(canvasWidth/2, canvasHeight - CONFIG.groundHeight/2, canvasWidth, CONFIG.groundHeight, wallOpts));
        Matter.World.add(world, Matter.Bodies.rectangle(CONFIG.wallThickness/2, canvasHeight/2, CONFIG.wallThickness, canvasHeight, wallOpts));
        Matter.World.add(world, Matter.Bodies.rectangle(canvasWidth - CONFIG.wallThickness/2, canvasHeight/2, CONFIG.wallThickness, canvasHeight, wallOpts));
        Matter.World.add(world, Matter.Bodies.rectangle(canvasWidth/2, -15, canvasWidth+30, 20, { isStatic: true, isSensor: true, render: { visible: false }, label: "topSensor" }));
    }

    function setupMatter() {
        engine = Matter.Engine.create({ gravity: { x: 0, y: CONFIG.gravity } });
        world = engine.world;
        
        engine.positionIterations = 15;
        engine.velocityIterations = 10;
        
        recreateBoundaries();
        runner = Matter.Runner.create();
        Matter.Runner.run(runner, engine);
        
        // Проверяем слияния каждый кадр
        Matter.Events.on(engine, 'afterUpdate', () => { 
            if(gameActive && !pendingMerge) {
                checkMergesIntensive();
            }
        });
        
        // Дополнительная проверка на коллизии
        Matter.Events.on(engine, 'collisionStart', (event) => {
            if(gameActive && !pendingMerge) {
                checkCollisionMerge(event);
            }
        });
    }
    
    // Проверка слияний через коллизии (самый надёжный способ)
    function checkCollisionMerge(event) {
        const pairs = event.pairs;
        for(let pair of pairs) {
            const bodyA = pair.bodyA;
            const bodyB = pair.bodyB;
            
            // Проверяем что оба тела - персонажи
            if(bodyA.characterId !== undefined && bodyB.characterId !== undefined) {
                if(!bodyA.merged && !bodyB.merged && bodyA.canMerge && bodyB.canMerge) {
                    if(bodyA.characterId === bodyB.characterId && bodyA.characterId < CHARACTERS.length - 1) {
                        performMerge(bodyA, bodyB);
                        return;
                    }
                }
            }
        }
    }
    
    // Интенсивная проверка всех пар
    function checkMergesIntensive() {
        if(pendingMerge) return;
        
        // Создаём массив активных персонажей
        const activeChars = characters.filter(c => !c.merged && c.canMerge);
        
        for(let i = 0; i < activeChars.length; i++) {
            for(let j = i + 1; j < activeChars.length; j++) {
                const A = activeChars[i];
                const B = activeChars[j];
                
                if(A.characterId === B.characterId && A.characterId < CHARACTERS.length - 1) {
                    // Вычисляем расстояние между центрами
                    const dx = A.position.x - B.position.x;
                    const dy = A.position.y - B.position.y;
                    const distance = Math.sqrt(dx*dx + dy*dy);
                    
                    // Порог слияния - сумма радиусов + большой запас
                    const mergeThreshold = A.circleRadius + B.circleRadius + 15;
                    
                    if(distance < mergeThreshold || distance < CONFIG.mergeDistance) {
                        performMerge(A, B);
                        return;
                    }
                }
            }
        }
    }

    function customDraw() {
        if(!ctx) return;
        ctx.clearRect(0, 0, canvasWidth, canvasHeight);
        
        for(let body of characters) {
            if(!body.characterData || body.merged) continue;
            const ch = body.characterData;
            const x = body.position.x, y = body.position.y, r = body.circleRadius;
            
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI*2);
            ctx.fillStyle = ch.color;
            ctx.fill();
            ctx.strokeStyle = "#e8c37e";
            ctx.lineWidth = 2;
            ctx.stroke();
            
            const img = getCharacterImage(ch.id);
            if (img && img.complete && img.naturalWidth > 0) {
                ctx.save();
                ctx.beginPath();
                ctx.arc(x, y, r - 5, 0, Math.PI*2);
                ctx.clip();
                const imgAspect = img.naturalWidth / img.naturalHeight;
                const circleArea = (r - 5) * 2;
                let drawWidth, drawHeight;
                if (imgAspect > 1) {
                    drawWidth = circleArea;
                    drawHeight = circleArea / imgAspect;
                } else {
                    drawHeight = circleArea;
                    drawWidth = circleArea * imgAspect;
                }
                ctx.drawImage(img, x - drawWidth/2, y - drawHeight/2, drawWidth, drawHeight);
                ctx.restore();
            } else {
                ctx.fillStyle = getContrast(ch.color);
                ctx.font = `bold ${Math.max(12, r * 0.5)}px 'Unbounded'`;
                ctx.textAlign = "center";
                ctx.textBaseline = "middle";
                ctx.fillText(ch.short, x, y);
            }
            
            if (ch.rarity === 'legendary') { ctx.beginPath(); ctx.arc(x, y, r+3, 0, Math.PI*2); ctx.strokeStyle = "#ffaa44"; ctx.lineWidth = 2; ctx.stroke(); }
            if (ch.rarity === 'mythic') { ctx.beginPath(); ctx.arc(x, y, r+3, 0, Math.PI*2); ctx.strokeStyle = "#c060ff"; ctx.lineWidth = 2; ctx.stroke(); }
            if (ch.rarity === 'ultimate') { ctx.beginPath(); ctx.arc(x, y, r+4, 0, Math.PI*2); ctx.strokeStyle = "#ffd966"; ctx.lineWidth = 2.5; ctx.stroke(); }
        }
        requestAnimationFrame(() => customDraw());
    }

    function spawnNextCharacter() {
        if(!gameActive) return;
        const available = [...unlockedCharacters];
        if(available.length === 0) { 
            nextCharacterId = 0; 
            updatePreviewUI(); 
            return; 
        }
        const randomIndex = Math.floor(Math.random() * available.length);
        nextCharacterId = available[randomIndex];
        updatePreviewUI();
    }

    async function updatePreviewUI() {
        let ch = CHARACTERS[nextCharacterId];
        let previewDiv = document.getElementById('next-preview');
        previewDiv.textContent = '';
        previewDiv.style.backgroundColor = ch.color;
        previewDiv.style.backgroundImage = 'none';
        
        const img = await loadSVG(ch.svg);
        if (img) {
            previewDiv.style.backgroundImage = `url(${ch.svg}.svg)`;
            previewDiv.style.backgroundSize = 'contain';
            previewDiv.style.backgroundPosition = 'center';
            previewDiv.style.backgroundColor = ch.color;
            previewDiv.textContent = '';
        } else {
            previewDiv.textContent = ch.short;
            previewDiv.style.color = getContrast(ch.color);
        }
        pendingChar = ch;
    }

    function dropCharacter(x, y, vx=0, vy=0) {
        if(!gameActive || !canDrop || !pendingChar) return;
        canDrop = false;
        let ch = pendingChar;
        let radius = ch.baseSize * 0.85;
        let spawnX = Math.min(Math.max(radius+8, x), canvasWidth - radius - 8);
        let spawnY = (y < 20) ? -radius : Math.max(5, y);
        
        const body = Matter.Bodies.circle(spawnX, spawnY, radius, {
            friction: 0.15,
            frictionAir: 0.008,
            restitution: 0.5,
            density: 0.0004,
            render: { visible: false }, 
            label: `char_${ch.id}`, 
            characterId: ch.id, 
            merged: false, 
            canMerge: true
        });
        body.characterData = ch;
        Matter.Body.setVelocity(body, { x: vx, y: vy || 1.5 });
        Matter.World.add(world, body);
        characters.push(body);
        createSparkle(spawnX, Math.max(20, spawnY+15), ch.color);
        
        setTimeout(() => {
            if(gameActive) { spawnNextCharacter(); canDrop = true; }
        }, CONFIG.spawnCooldown);
    }

    async function performMerge(A, B) {
        if(pendingMerge) return;
        pendingMerge = true;
        
        // Проверяем что оба ещё существуют
        if(A.merged || B.merged) {
            pendingMerge = false;
            return;
        }
        
        A.merged = true;
        B.merged = true;
        A.canMerge = false;
        B.canMerge = false;
        
        // Удаляем старые тела
        Matter.World.remove(world, [A, B]);
        characters = characters.filter(c => c !== A && c !== B);
        
        // Создаём нового персонажа
        let newId = Math.min(A.characterId + 1, CHARACTERS.length - 1);
        let newChar = CHARACTERS[newId];
        
        let midX = (A.position.x + B.position.x) / 2;
        let midY = Math.min(canvasHeight - 60, Math.max(45, (A.position.y + B.position.y) / 2 - 35));
        
        await loadSVG(newChar.svg);
        
        const newRadius = newChar.baseSize * 0.85;
        const newBody = Matter.Bodies.circle(midX, midY, newRadius, {
            friction: 0.15,
            frictionAir: 0.008,
            restitution: 0.5,
            density: 0.0004,
            render: { visible: false }, 
            characterId: newId, 
            merged: false, 
            canMerge: true
        });
        newBody.characterData = newChar;
        
        Matter.Body.setVelocity(newBody, { x: (Math.random() - 0.5) * 3, y: -4 });
        Matter.World.add(world, newBody);
        characters.push(newBody);
        
        score += newChar.points;
        document.getElementById('score').innerText = score.toLocaleString();
        
        if(!unlockedCharacters.includes(newId)) {
            unlockedCharacters.push(newId);
            unlockedCharacters.sort((a,b) => a - b);
            updateCollectionUI();
            updateChainUI();
        }
        
        // Мощный визуальный эффект
        createSparkle(midX, midY, newChar.color, 30);
        createSparkle(midX - 25, midY - 20, '#ffcc66', 18);
        createSparkle(midX + 25, midY - 20, '#ffcc66', 18);
        createSparkle(midX, midY - 30, '#ffffff', 15);
        
        if(newId === CHARACTERS.length - 1) {
            endGame(true);
        } else {
            checkGameOver();
        }
        
        setTimeout(() => {
            pendingMerge = false;
        }, 120);
    }

    function checkGameOver() {
        if(!gameActive) return;
        
        if(characters.length > CONFIG.maxCharacters) {
            const topOnes = characters.filter(c => c.position.y - c.circleRadius < canvasHeight * 0.2);
            if(topOnes.length > 12) {
                endGame(false);
                return;
            }
        }
        
        const highCount = characters.filter(c => c.position.y - c.circleRadius < canvasHeight * 0.08).length;
        if(highCount > 12) {
            endGame(false);
        }
    }

    function endGame(won) {
        if(!gameActive) return;
        gameActive = false;
        if(runner) Matter.Runner.stop(runner);
        
        const modal = document.getElementById('game-over-modal');
        document.getElementById('final-score').innerText = score.toLocaleString();
        document.getElementById('unlocked-count').innerText = unlockedCharacters.length;
        const titleEl = document.getElementById('game-result');
        
        if(won) { 
            titleEl.innerHTML = "🏆 ВАНИЛЬ РОЖДЕНА! 🏆"; 
            titleEl.style.color = "#e8b45e"; 
        } else { 
            titleEl.innerHTML = "💥 КАСТРЮЛЯ ПЕРЕПОЛНЕНА 💥"; 
            titleEl.style.color = "#ff8866"; 
        }
        
        modal.style.visibility = "visible";
        modal.style.opacity = "1";
    }

    function restartGame() {
        if(runner) Matter.Runner.stop(runner);
        if(world) Matter.World.clear(world, false);
        if(engine) Matter.Engine.clear(engine);
        
        characters = [];
        score = 0;
        unlockedCharacters = [0];
        nextCharacterId = 0;
        canDrop = true;
        gameActive = true;
        pendingMerge = false;
        
        document.getElementById('score').innerText = "0";
        document.getElementById('game-over-modal').style.visibility = "hidden";
        document.getElementById('game-over-modal').style.opacity = "0";
        
        setupMatter();
        recreateBoundaries();
        
        (async () => {
            await updateCollectionUI();
            await updateChainUI();
            spawnNextCharacter();
        })();
        
        if(runner) Matter.Runner.run(runner, engine);
        customDraw();
    }

    function createSparkle(x, y, color, size=10) {
        const s = document.createElement('div');
        s.className = 'sparkle';
        const rect = gameContainer.getBoundingClientRect();
        s.style.left = (rect.left + x) + 'px';
        s.style.top = (rect.top + y) + 'px';
        s.style.width = s.style.height = size + 'px';
        s.style.backgroundColor = color;
        s.style.boxShadow = `0 0 20px ${color}`;
        
        const angle = Math.random() * Math.PI * 2;
        const dist = 25 + Math.random() * 55;
        s.style.setProperty('--tx', Math.cos(angle) * dist + 'px');
        s.style.setProperty('--ty', Math.sin(angle) * dist - 20 + 'px');
        
        document.body.appendChild(s);
        setTimeout(() => s.remove(), 700);
    }

    async function updateCollectionUI() {
        const container = document.getElementById('character-list');
        container.innerHTML = '';
        
        for(const ch of CHARACTERS) {
            const div = document.createElement('div');
            div.className = `char-icon ${unlockedCharacters.includes(ch.id) ? 'unlocked' : ''}`;
            div.style.backgroundColor = ch.color;
            div.title = `${ch.name}\n+${ch.points} очков`;
            
            const img = await loadSVG(ch.svg);
            if(img && unlockedCharacters.includes(ch.id)) {
                div.style.backgroundImage = `url(${ch.svg}.svg)`;
                div.style.backgroundSize = 'contain';
                div.textContent = '';
            } else {
                div.textContent = ch.short;
                div.style.color = getContrast(ch.color);
            }
            container.appendChild(div);
        }
    }
    
    async function updateChainUI() {
        const container = document.getElementById('merge-chain');
        container.innerHTML = '';
        
        for(let i = 0; i < CHARACTERS.length; i++) {
            const ch = CHARACTERS[i];
            const node = document.createElement('div');
            node.className = `chain-node ${unlockedCharacters.includes(i) ? 'unlocked-chain' : ''}`;
            node.style.backgroundColor = ch.color;
            node.title = `${ch.name}`;
            
            const img = await loadSVG(ch.svg);
            if(img && unlockedCharacters.includes(i)) {
                node.style.backgroundImage = `url(${ch.svg}.svg)`;
                node.style.backgroundSize = 'contain';
                node.textContent = '';
            } else {
                node.textContent = ch.short;
                node.style.color = getContrast(ch.color);
            }
            container.appendChild(node);
        }
    }

    function startAim(e) {
        if(!gameActive || !canDrop || !pendingChar) return;
        isAiming = true;
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
        const clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);
        aimStart.x = clientX - rect.left;
        aimStart.y = clientY - rect.top;
        aimCurrent = { ...aimStart };
        aimLine.style.display = 'block';
    }
    
    function updateAim(e) {
        if(!isAiming) return;
        const rect = canvas.getBoundingClientRect();
        const clientX = e.clientX ?? (e.touches ? e.touches[0].clientX : 0);
        const clientY = e.clientY ?? (e.touches ? e.touches[0].clientY : 0);
        aimCurrent.x = Math.min(canvasWidth, Math.max(0, clientX - rect.left));
        aimCurrent.y = Math.min(canvasHeight, Math.max(0, clientY - rect.top));
        const line = aimLine.querySelector('line');
        line.setAttribute('x1', aimStart.x);
        line.setAttribute('y1', aimStart.y);
        line.setAttribute('x2', aimCurrent.x);
        line.setAttribute('y2', aimCurrent.y);
    }
    
    function endAim() {
        if(!isAiming || !gameActive) { 
            isAiming = false; 
            aimLine.style.display = 'none'; 
            return; 
        }
        isAiming = false;
        aimLine.style.display = 'none';
        if(!pendingChar) return;
        
        const dx = aimStart.x - aimCurrent.x;
        const dy = aimStart.y - aimCurrent.y;
        const power = Math.min(Math.hypot(dx, dy) * CONFIG.aimPower, 14);
        const angle = Math.atan2(dy, dx);
        const vx = Math.cos(angle) * power;
        const vy = Math.sin(angle) * power - 2.5;
        dropCharacter(aimStart.x, aimStart.y - 5, vx, vy);
    }

    async function init() {
        gameContainer = document.getElementById('game-container');
        canvas = document.getElementById('game-canvas');
        ctx = canvas.getContext('2d');
        aimLine = document.getElementById('aim-line');
        
        for(let i = 0; i < CHARACTERS.length; i++) {
            await loadSVG(CHARACTERS[i].svg);
        }
        
        window.addEventListener('resize', () => { resizeAndFit(); recreateBoundaries(); });
        resizeAndFit();
        setupMatter();
        await updateCollectionUI();
        await updateChainUI();
        spawnNextCharacter();
        customDraw();
        
        canvas.addEventListener('mousedown', startAim);
        canvas.addEventListener('mousemove', updateAim);
        canvas.addEventListener('mouseup', endAim);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startAim(e.touches[0]); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); updateAim(e.touches[0]); });
        canvas.addEventListener('touchend', (e) => { e.preventDefault(); endAim(); });
        
        document.getElementById('drop-btn').addEventListener('click', () => {
            if(gameActive && canDrop && pendingChar) {
                dropCharacter(canvasWidth/2, -20, (Math.random() - 0.5) * 2, 3);
            }
        });
        
        document.getElementById('restart-btn').addEventListener('click', () => restartGame());
        document.getElementById('restart-modal-btn').addEventListener('click', () => restartGame());
    }
    
    init();
</script>
</body>
</html>
